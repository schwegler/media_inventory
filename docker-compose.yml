services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: media_inventory
      POSTGRES_PASSWORD: development
      POSTGRES_DB: media_inventory_development
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: bash -c "./bin/rails db:prepare && ./bin/rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://media_inventory:development@db:5432/media_inventory_development
      RAILS_LOG_TO_STDOUT: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    tty: true
    stdin_open: true

volumes:
  postgres_data:
  bundle_cache:
